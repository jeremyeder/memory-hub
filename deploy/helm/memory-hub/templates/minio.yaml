{{- if .Values.minio.enabled }}
{{- $ns := .Values.namespaces.mcp }}
{{- $minioSecret := default "memoryhub-minio-credentials" .Values.secrets.minioCredentials.existingSecret }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.minio.serviceAccount }}
  namespace: {{ $ns }}
  labels:
    {{- include "memory-hub.labels" . | nindent 4 }}
    app.kubernetes.io/name: memoryhub-minio
    app.kubernetes.io/component: storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memoryhub-minio-data
  namespace: {{ $ns }}
  labels:
    {{- include "memory-hub.labels" . | nindent 4 }}
    app.kubernetes.io/name: memoryhub-minio
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.minio.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: memoryhub-minio
  namespace: {{ $ns }}
  labels:
    {{- include "memory-hub.labels" . | nindent 4 }}
    app.kubernetes.io/name: memoryhub-minio
    app.kubernetes.io/component: storage
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
  selector:
    app.kubernetes.io/name: memoryhub-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoryhub-minio
  namespace: {{ $ns }}
  labels:
    {{- include "memory-hub.labels" . | nindent 4 }}
    app.kubernetes.io/name: memoryhub-minio
    app.kubernetes.io/component: storage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: memoryhub-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoryhub-minio
        app.kubernetes.io/part-of: memoryhub
        app.kubernetes.io/component: storage
    spec:
      serviceAccountName: {{ .Values.minio.serviceAccount }}
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
              protocol: TCP
            - containerPort: 9001
              name: console
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ $minioSecret }}
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: minio-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: memoryhub-minio-data
{{- end }}
