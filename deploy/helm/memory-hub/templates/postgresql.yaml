{{- if .Values.postgresql.enabled }}
{{- $ns := .Values.namespaces.db }}
{{- $pgSecret := default "memoryhub-pg-credentials" .Values.secrets.pgCredentials.existingSecret }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: memoryhub-pg-init
  namespace: {{ $ns }}
  labels:
    {{- include "memory-hub.labels" . | nindent 4 }}
    app.kubernetes.io/name: memoryhub-pg
    app.kubernetes.io/component: database
data:
  01-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memoryhub-pg-data
  namespace: {{ $ns }}
  labels:
    {{- include "memory-hub.labels" . | nindent 4 }}
    app.kubernetes.io/name: memoryhub-pg
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: memoryhub-pg
  namespace: {{ $ns }}
  labels:
    {{- include "memory-hub.labels" . | nindent 4 }}
    app.kubernetes.io/name: memoryhub-pg
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgresql
  selector:
    app.kubernetes.io/name: memoryhub-pg
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: memoryhub-pg
  namespace: {{ $ns }}
  labels:
    {{- include "memory-hub.labels" . | nindent 4 }}
    app.kubernetes.io/name: memoryhub-pg
    app.kubernetes.io/component: database
spec:
  serviceName: memoryhub-pg
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memoryhub-pg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoryhub-pg
        app.kubernetes.io/part-of: memoryhub
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
              name: postgresql
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ $pgSecret }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            - name: pg-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.secrets.pgCredentials.postgresUser | quote }}, "-d", {{ .Values.secrets.pgCredentials.postgresDb | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.secrets.pgCredentials.postgresUser | quote }}, "-d", {{ .Values.secrets.pgCredentials.postgresDb | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: memoryhub-pg-data
        - name: pg-init
          configMap:
            name: memoryhub-pg-init
{{- end }}
