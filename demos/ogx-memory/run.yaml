# OGX (LlamaStack) distribution config with MemoryHub memory
#
# This run.yaml registers MemoryHub as an MCP connector so the agent
# gets persistent cross-session memory without any memory-handling code.
#
# Usage:
#   export MEMORYHUB_MCP_URL="http://memory-hub-mcp.memory-hub-mcp.svc.cluster.local:8080/mcp"
#   export MEMORYHUB_API_KEY="mh-dev-..."
#   llama stack run ./run.yaml
#
# Requires: OGX (llama-stack) 0.7+ with MCP support
#
# Tested: OGX 0.7.1 on OpenShift with MemoryHub MCP server (2026-07-08)

version: 2

image_name: ogx-memory-demo

apis:
  - agents
  - inference
  - responses
  - tool_runtime

providers:
  inference:
    - provider_id: together
      provider_type: remote::together
      config:
        url: https://api.together.xyz/v1
        api_key: ${TOGETHER_API_KEY}

    # Or use an on-cluster vLLM model:
    # - provider_id: vllm
    #   provider_type: remote::vllm
    #   config:
    #     base_url: ${VLLM_URL}
    #     max_tokens: 4096
    #     api_token: ${VLLM_API_TOKEN:-fake}

  tool_runtime:
    - provider_id: model-context-protocol
      provider_type: remote::model-context-protocol

  responses:
    - provider_id: builtin
      provider_type: inline::builtin

# OGX 0.7+ uses connectors (not tool_groups) for MCP servers.
# The connector is discovered at startup; tools are available to the
# agent via the Responses API.
connectors:
  - connector_id: memoryhub
    provider_id: model-context-protocol
    url: ${MEMORYHUB_MCP_URL}
